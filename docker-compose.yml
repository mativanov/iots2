services:
  postgres:
    image: postgres:16-alpine
    container_name: iot-postgres
    environment:
      POSTGRES_DB: iotdb
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: iotpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotuser -d iotdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ok >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: iot-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  mqtt-ingestion-service:
    build:
      context: .
      dockerfile: mqtt/ingestion-service/Dockerfile
    container_name: mqtt-ingestion-service
    environment:
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-iot/readings}
      MQTT_QOS: ${MQTT_QOS:-0}
      TOTAL_MESSAGES: ${TOTAL_MESSAGES:-100}
      MESSAGES_PER_SECOND: ${MESSAGES_PER_SECOND:-10}
      DEVICE_COUNT: ${DEVICE_COUNT:-10}
      DATASET_PATH: ${DATASET_PATH:-}
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: "no"

  mqtt-storage-service:
    build:
      context: .
      dockerfile: mqtt/storage-service/Dockerfile
    container_name: mqtt-storage-service
    environment:
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-iot/readings}
      MQTT_QOS: ${MQTT_QOS:-2}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: iotdb
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: iotpass
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mqtt-analytics-service:
    build:
      context: .
      dockerfile: mqtt/analytics-service/Dockerfile
    container_name: mqtt-analytics-service
    environment:
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-iot/readings}
      MQTT_QOS: ${MQTT_QOS:-2}
      ALERT_THRESHOLD: ${ALERT_THRESHOLD:-50}
      WINDOW_SECONDS: ${WINDOW_SECONDS:-10}
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  kafka-ingestion-service:
    build:
      context: .
      dockerfile: kafka/ingestion-service/Dockerfile
    container_name: kafka-ingestion-service
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-iot.readings}
      KAFKA_ACKS: ${KAFKA_ACKS:-all}
      TOTAL_MESSAGES: ${TOTAL_MESSAGES:-100}
      MESSAGES_PER_SECOND: ${MESSAGES_PER_SECOND:-10}
      DEVICE_COUNT: ${DEVICE_COUNT:-10}
      DATASET_PATH: ${KAFKA_DATASET_PATH:-/app/sample-data/Smart_Farming_Crop_Yield_2024.csv}
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  kafka-storage-service:
    build:
      context: .
      dockerfile: kafka/storage-service/Dockerfile
    container_name: kafka-storage-service
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-iot.readings}
      KAFKA_GROUP_ID: ${KAFKA_STORAGE_GROUP_ID:-kafka-storage}
      KAFKA_PARTITIONS: ${KAFKA_PARTITIONS:-3}
      KAFKA_MAX_POLL_RECORDS: ${KAFKA_MAX_POLL_RECORDS:-500}
      KAFKA_CONCURRENCY: ${KAFKA_CONCURRENCY:-1}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-earliest}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: iotdb
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: iotpass
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kafka-analytics-service:
    build:
      context: .
      dockerfile: kafka/analytics-service/Dockerfile
    container_name: kafka-analytics-service
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-iot.readings}
      KAFKA_GROUP_ID: ${KAFKA_ANALYTICS_GROUP_ID:-kafka-analytics}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_ANALYTICS_OFFSET_RESET:-latest}
      ALERT_THRESHOLD: ${ALERT_THRESHOLD:-50}
      WINDOW_SECONDS: ${WINDOW_SECONDS:-10}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  kafka_data:
